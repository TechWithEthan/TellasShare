<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tellas Share — Upload</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Sora',sans-serif;
}

body{
background:#0b0f19;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#111a30;
padding:40px;
border-radius:12px;
width:480px;
text-align:center;
}

h1{
margin-bottom:25px;
}

.drop-area{
border:2px dashed #4da3ff;
padding:40px;
border-radius:10px;
cursor:pointer;
margin-bottom:20px;
}

.drop-area:hover{
background:#162044;
}

textarea{
width:100%;
height:90px;
margin-top:10px;
padding:10px;
border:none;
border-radius:6px;
background:#1b2645;
color:white;
resize:none;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:6px;
background:#4da3ff;
color:white;
cursor:pointer;
}

button:hover{
background:#2e8cff;
}

.progress{
width:100%;
height:8px;
background:#1b2645;
border-radius:10px;
margin-top:20px;
overflow:hidden;
display:none;
}

.bar{
height:100%;
width:0%;
background:#4da3ff;
}

.linkBox{
margin-top:20px;
background:#1b2645;
padding:12px;
border-radius:6px;
font-size:13px;
display:none;
word-break:break-all;
}

</style>
</head>

<body>

<div class="container">

<h1>Tellas Share</h1>

<div class="drop-area" id="dropArea">
Drag & Drop File Here<br>or Click to Upload
<input type="file" id="fileInput" hidden>
</div>

<textarea id="messageInput" placeholder="Optional message..."></textarea>

<button onclick="generateLink()">Generate Share Link</button>

<div class="progress">
<div class="bar" id="progressBar"></div>
</div>

<div class="linkBox" id="linkBox"></div>

</div>

<script>

let selectedFile=null;

const dropArea=document.getElementById("dropArea");
const fileInput=document.getElementById("fileInput");

dropArea.addEventListener("click",()=>fileInput.click());

fileInput.addEventListener("change",(e)=>{
selectedFile=e.target.files[0];
dropArea.innerHTML="File Selected:<br>"+selectedFile.name;
});

dropArea.addEventListener("dragover",(e)=>{
e.preventDefault();
});

dropArea.addEventListener("drop",(e)=>{
e.preventDefault();
selectedFile=e.dataTransfer.files[0];
dropArea.innerHTML="File Selected:<br>"+selectedFile.name;
});

function generateLink(){

let message=document.getElementById("messageInput").value;

let progress=document.querySelector(".progress");
let bar=document.getElementById("progressBar");

progress.style.display="block";

let percent=0;

let interval=setInterval(()=>{

percent+=10;
bar.style.width=percent+"%";

if(percent>=100){

clearInterval(interval);

let id=Math.random().toString(36).substring(2);

let data={message:message};

if(selectedFile){

let reader=new FileReader();

reader.onload=function(){

data.file=reader.result;
data.fileName=selectedFile.name;

localStorage.setItem(id,JSON.stringify(data));

showLink(id);

};

reader.readAsDataURL(selectedFile);

}

else{

localStorage.setItem(id,JSON.stringify(data));

showLink(id);

}

}

},200);

}

function showLink(id){

let link=window.location.origin+"/upload?s="+id;

let box=document.getElementById("linkBox");

box.style.display="block";
box.innerHTML="Share this secure link:<br>"+link;

}

function loadShared(){

const params=new URLSearchParams(window.location.search);
const id=params.get("s");

if(id){

let data=JSON.parse(localStorage.getItem(id));

if(data){

document.body.innerHTML="";

let div=document.createElement("div");

div.style.padding="40px";

div.innerHTML="<h2>Shared Content</h2>";

if(data.message){

div.innerHTML+="<p>"+data.message+"</p>";

}

if(data.file){

div.innerHTML+=`<br><a download="${data.fileName}" href="${data.file}">Download ${data.fileName}</a>`;

}

document.body.appendChild(div);

window.history.replaceState({},document.title,"/upload");

}

}

}

loadShared();

</script>

</body>
</html>
